{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container py-5 auth-page">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow p-4">
        <h1 class="h3 fw-bold mb-3">Create Account</h1>
        <form method="post">
          <label class="form-label">Username</label><input name="username" class="form-control mb-3" required>
          <label class="form-label">Email</label><input name="email" type="email" class="form-control mb-3" required>
          <label class="form-label">Password</label><input name="password" type="password" class="form-control mb-3" minlength="10" required>
          <button class="btn btn-warning w-100">Register</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
