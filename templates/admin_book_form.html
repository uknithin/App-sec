{% extends 'base.html' %}
{% block title %}Book Form{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="card p-4 shadow-sm mx-auto" style="max-width:720px">
    <h1 class="h3 fw-bold">{{ 'Edit Book' if book else 'Add Book' }}</h1>
    <form method="post">
      <label class="form-label">Title</label><input name="title" class="form-control mb-3" value="{{ book['title'] if book else '' }}" required>
      <label class="form-label">Author</label><input name="author" class="form-control mb-3" value="{{ book['author'] if book else '' }}" required>
      <label class="form-label">Category</label><input name="category" class="form-control mb-3" value="{{ book['category'] if book else '' }}" required>
      <label class="form-label">Price</label><input name="price" type="number" step="0.01" class="form-control mb-3" value="{{ book['price'] if book else '' }}" required>
      <label class="form-label">Stock</label><input name="stock" type="number" class="form-control mb-3" value="{{ book['stock'] if book else '' }}" required>
      <label class="form-label">Description</label><textarea name="description" class="form-control mb-3" rows="4" required>{{ book['description'] if book else '' }}</textarea>
      <button class="btn btn-warning">Save</button> <a class="btn btn-outline-dark" href="{{ url_for('admin_dashboard') }}">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
