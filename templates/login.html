{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container py-5 auth-page">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow p-4">
        <h1 class="h3 fw-bold mb-3">Login</h1>
        <form method="post">
          <label class="form-label">Username</label><input name="username" class="form-control mb-3" required>
          <label class="form-label">Password</label><input name="password" type="password" class="form-control mb-3" required>
          <button class="btn btn-dark w-100">Sign in</button>
        </form>
        <p class="mt-3 mb-0 small">No account? <a href="{{ url_for('register') }}">Register here</a>.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
